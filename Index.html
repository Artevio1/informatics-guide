<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Энциклопедия</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>IT Энциклопедия</h1>
            <div class="nav-menu">
                <a href="#" class="btn-nav active" onclick="switchTab('terms')">Справочник</a>
                <a href="#" class="btn-nav" onclick="switchTab('game')">Игра Мемори</a>
                <a href="quiz.html" class="btn-nav">Викторина</a>
            </div>
        </header>

        <div id="tab-terms">
            <div class="search-box">
                <input type="text" id="termSearch" placeholder="Найти термин..." oninput="filterTerms()">
            </div>
            <div id="termsGrid" class="terms-grid"></div>
        </div>

        <div id="tab-game" style="display: none;">
            <div style="text-align: center; margin-bottom: 20px;">
                <h2>Найди пары</h2>
                <p>Сопоставь термин и его описание</p>
                <button class="btn-nav" style="background: var(--primary); color: #000;" onclick="initMemoryGame()">Начать заново</button>
            </div>
            <div id="memoryBoard" class="memory-board"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script src="memory.js"></script>
<div id="infoModal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModalForce()">&times;</span>
        <img id="m-img" src="" alt="">
        <div class="modal-body">
            <h2 id="m-title"></h2>
            <p id="m-desc"></p>
            <div class="modal-actions">
                <a id="m-wiki" href="#" target="_blank" class="wiki-link">
                    <i class="fab fa-wikipedia-w"></i> Читать в Wikipedia
                </a>
            </div>
        </div>
    </div>
</div>
<div class="search-box">
    <input type="text" id="termSearch" placeholder="Поиск термина или определения..." oninput="filterTerms()">
</div>
</body>
</html>
